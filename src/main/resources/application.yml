spring:
  application:
    name: api
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      # Persistent DB: accounts, bookings and seeded practices survive restarts.
      # The seeders are guarded (findByUsername/findByName) so they do not duplicate
      # on later starts.
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${EMAIL_HOST}
    port: ${EMAIL_PORT}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          # iCloud (smtp.mail.me.com) on port 587 speaks plain SMTP first and then
          # upgrades the connection with STARTTLS. Implicit SSL (ssl.enable) is only
          # for port 465 and made the handshake fail with "Unrecognized SSL message".
          starttls:
            enable: true
            required: true
        debug: false
server:
  error:
    # Do not echo raw exception messages in HTTP error bodies (information leak).
    include-message: never

# Quieter logging: TRACE/DEBUG on security and web logs session ids, auth decisions
# and full SMTP/SQL, which leaks internals. Raise locally only when debugging.
logging.level:
  org.springframework.security: INFO
  org.springframework.web: INFO

springdoc:
  api-docs:
    enabled: ${API_DOCS_ENABLED}

jasypt:
  encryptor:
    # Key for the encrypted PII columns. Injected from the (gitignored) .env, never
    # committed - see JASYPT_PASSWORD.
    password: ${JASYPT_PASSWORD}

pseudo:
  mapping:
    file: data/mappings.enc
  # AES key for the user<->pseudonym map. Injected from the (gitignored) .env.
  key: ${PSEUDO_KEY}

mail:
  from: ${EMAIL_FROM:noreply@impfportal.local}
  # Default points at the frontend's verify page, so a missing env var does not
  # crash startup and the mailed link lands on /verify-email/{token}.
  verification-base-url: ${EMAIL_VERIFICATION_BASE_URL:http://localhost:3000/verify-email/}
