spring:
  application:
    name: api
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${EMAIL_HOST}
    port: ${EMAIL_PORT}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        transport:
          protocol: smtp
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false
server:
  error:
    include-message: never

logging.level:
  org.springframework.security: INFO
  org.springframework.web: INFO

springdoc:
  api-docs:
    enabled: ${API_DOCS_ENABLED}

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD}

pseudo:
  mapping:
    file: data/mappings.enc
  key: ${PSEUDO_KEY}

mail:
  from: ${EMAIL_FROM:noreply@impfportal.local}
  verification-base-url: ${EMAIL_VERIFICATION_BASE_URL:http://localhost:3000/verify-email/}

app-env:
  mode: ${APP_ENV}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN}

prod:
  admin-username: ${PROD_ADMIN_USERNAME}
  admin-password: ${PROD_ADMIN_PASSWORD}
